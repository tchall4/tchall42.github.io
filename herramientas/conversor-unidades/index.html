<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades Gratis | Mi Sitio</title>
    <meta name="description" content="Convierte unidades de medida: metros, kilos, litros, temperatura, etc.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #333;
        }

        select, input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .result-box {
            background: #f0f0f0;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 2rem;
            text-align: center;
        }

        .result-number {
            font-size: 2rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .result-label {
            color: #666;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚖️ Conversor de Unidades</h1>
        <p class="subtitle">Convierte unidades de medida al instante</p>

        <div class="form-group">
            <label for="categoria">Selecciona categoría:</label>
            <select id="categoria" onchange="cambiarCategoria()">
                <option value="longitud">Longitud (metros, kilómetros, etc)</option>
                <option value="peso">Peso (gramos, kilos, etc)</option>
                <option value="temperatura">Temperatura (Celsius, Fahrenheit)</option>
                <option value="volumen">Volumen (litros, mililitros, etc)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="valor">Valor a convertir:</label>
            <input type="number" id="valor" placeholder="0" oninput="convertir()">
        </div>

        <div class="row">
            <div class="form-group">
                <label for="unidad-origen">De:</label>
                <select id="unidad-origen" onchange="convertir()"></select>
            </div>
            <div class="form-group">
                <label for="unidad-destino">A:</label>
                <select id="unidad-destino" onchange="convertir()"></select>
            </div>
        </div>

        <div class="result-box">
            <div class="result-number" id="resultado">0</div>
            <div class="result-label" id="resultado-label">Resultado</div>
        </div>

        <a href="/" class="back-link">← Volver al inicio</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
